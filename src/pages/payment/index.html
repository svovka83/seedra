<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Payment</title>
		<script type="module" crossorigin src="/seedra/assets/main-D8WtiC0F.js"></script>
		<link rel="stylesheet" crossorigin href="/seedra/assets/main-DNsu_wzd.css">
	</head>
	<body style="display: grid; grid-template-rows: auto 1fr auto">
		<!-- header (  ) -->
		<!-- prettier-ignore -->
		
    
  <header class="header">
    <div class="header__inner container">
      <div class="header__logo">
        <!-- logo ( ( path, classIcon ) ) -->
        <!-- prettier-ignore -->
        
        
  <a class="logo" href="/seedra/">
    <svg class="logo-icon logo-icon_header">
      <use xlink:href="/seedra/images/sprites.svg#logo-icon"></use>
    </svg>
  </a>

      </div>

      <div class="header__menu">
        <!-- menu ( classList, classItem ) -->
        <!-- prettier-ignore -->
        
        
  <nav class="menu">
    <ul class="menu__list menu__list_header">
      <li class="menu__item">
        <a class="menu__link " href="/seedra/src/pages/products/index.html">ALL PRODUCTS</a>
      </li>
      <li class="menu__item">
        <a class="menu__link" href="/seedra/src/pages/about/index.html">ABOUT SEEDRA</a>
      </li>
      <li class="menu__item">
        <a class="menu__link" href="/seedra/src/pages/blogs/index.html">OUR BLOG</a>
      </li>
      <li class="menu__item">
        <a class="menu__link" href="/seedra/src/pages/contacts/index.html">CONTACTS</a>
      </li>
    </ul>
  </nav>

      </div>

      <div class="header__socials">
        <!-- socials ( classSocials ) -->
        <!-- prettier-ignore -->
        
        
  <div class="socials socials_header">
    <a class="socials__link" href="#!">
      <svg class="socials__icon">
        <use xlink:href="/seedra/images/sprites.svg#instagram-icon"></use>
      </svg>
    </a>
    <a class="socials__link" href="#!">
      <svg class="socials__icon">
        <use xlink:href="/seedra/images/sprites.svg#facebook-icon"></use>
      </svg>
    </a>
  </div>

      </div>

      <div class="header__search">
        <!-- search ( classSearch ) -->
        <!-- prettier-ignore -->
        
        
  <div class="search search_header">
    <input class="search__input" type="text" placeholder="Search">
    <svg class="search__icon">
	    <use xlink:href="/seedra/images/sprites.svg#search-icon"></use>
    </svg>
    <img class="search__img" src="/seedra/images/icons/funnel.svg" id="" alt="search icon funnel">
  </div>

      </div>

      <!-- cart-block -->
      <div class="header__cart-block">
        <a class="header__cart-block-link" href="#!">
          <svg class="header__cart-block-icon">
            <use href="/seedra/images/sprites.svg#heart-icon"></use>
          </svg>
        </a>
        <button class="header__cart-block-link" id="open-modal-cart">
          <svg class="header__cart-block-icon">
            <use href="/seedra/images/sprites.svg#cart-icon"></use>
          </svg>
        </button>
      </div>

      <button class="header__burger-menu">
        <svg class="header__burger-menu-icon">
          <use href="/seedra/images/sprites.svg#burger-icon"></use>
        </svg>
      </button>
    </div>
  </header>


		<main class="payment-main container" id="go-to-top">
			<!-- payment-info -->
			<section class="payment-info">
				<div class="payment-info__top">
					<a class="payment-info__link" href="/seedra/src/pages/checkout/index.html">
						<svg class="payment-info__top-icon">
							<use href="/seedra/images/sprites.svg#arrow-back"></use>
						</svg>
					</a>
					<div class="payment-info__top-title">
						<!-- title ( heading, title, classTitle ) -->
						<!-- prettier-ignore -->
						
						
  <h2 class="title title_h2">Payment info</h2>

					</div>
					<div class="payment-info__top-navigation">
						<!-- cartNavigator( classCheckout, classPayment ) -->
						<!-- prettier-ignore -->
						
						
  <div class="cart-navigator">
    <a href="/seedra/src/pages/checkout/index.html" class="cart-navigator__point cart-navigator__point_not-active"></a>
    <a href="/seedra/src/pages/payment/index.html" class="cart-navigator__point "></a>
  </div>

					</div>
				</div>
				<div class="payment-info__title">
					<!-- title ( heading, title, classTitle ) -->
					<!-- prettier-ignore -->
					
					
  <h3 class="title title_h3 title_h3-mobile-checkout">Personal info</h3>

				</div>
				<form class="payment-info__payment-form" action="#!" id="payment-form">
					<div class="payment-info__type">
						<!-- text ( text, classText ) -->
						<!-- prettier-ignore -->
						
						
  <p class="text text_regular-14">Card type</p>

					</div>
					<div class="payment-info__cards">
						<label class="payment-info__cards-block">
							<input type="radio" name="payment-card" />
							<div class="payment-info__cards-item">
								<img
									class="payment-info__cards-img"
									src="/seedra/images/payment/apple.png"
									alt="payment card" />
							</div>
						</label>
						<label class="payment-info__cards-block">
							<input type="radio" name="payment-card" />
							<div class="payment-info__cards-item">
								<img
									class="payment-info__cards-img"
									src="/seedra/images/payment/visa.png"
									alt="payment card" />
							</div>
						</label>
						<label class="payment-info__cards-block">
							<input type="radio" name="payment-card" />
							<div class="payment-info__cards-item">
								<img
									class="payment-info__cards-img"
									src="/seedra/images/payment/mastercard.png"
									alt="payment card" />
							</div>
						</label>
						<label class="payment-info__cards-block">
							<input type="radio" name="payment-card" />
							<div class="payment-info__cards-item">
								<img
									class="payment-info__cards-img"
									src="/seedra/images/payment/paypal.png"
									alt="payment card" />
							</div>
						</label>
					</div>
					<div class="payment-info__form">
						<!-- input( inputLabel, placeholder, type, classInput, inputId ) -->
						<!-- prettier-ignore -->
						
						
  <div class="input-block">
    <label class="label" for="payment-card">Card number</label>
    <input class="input " id="payment-card" type="text" placeholder="0000 0000 0000 0000" />
    <p class="validation"></p>
  </div>

						
  <div class="input-block">
    <label class="label" for="payment-date">Expiring date</label>
    <input class="input " id="payment-date" type="text" placeholder="01/01" />
    <p class="validation"></p>
  </div>

						
  <div class="input-block">
    <label class="label" for="payment-ccv">CCV</label>
    <input class="input " id="payment-ccv" type="text" placeholder="123" />
    <p class="validation"></p>
  </div>

					</div>
					<hr class="payment-info__hr" />
					<!-- it might be a component -->
					<div class="cart-summary__amount-block">
						<span class="cart-summary__text">Total amount</span>
						<p class="cart-summary__amount">
							$<span id="cart-summary__amount1"><!-- quantity comes from firebse --></span>
						</p>
					</div>
					<button class="payment-info__button payment-info__button_disabled">
						<p class="payment-info__button-amount">
							$<span id="cart-summary__amount2"><!-- quantity comes from firebse --></span>
						</p>
						<span class="payment-info__button-text">Continue</span>
						<a class="payment-info__button-link" href="/seedra/src/pages/checkout/index.html">
							<svg class="payment-info__button-icon">
								<use href="/seedra/images/sprites.svg#arrow-back"></use>
							</svg>
						</a>
					</button>
				</form>
			</section>
		</main>

		<!-- footer (  ) -->
		<!-- prettier-ignore -->
		
		
  <footer class="footer">
    <div class="container">
      <div class="footer__top">
        <div class="footer__menu">
          <!-- menu ( classList, classItem ) -->
          <!-- prettier-ignore -->
          
        
  <nav class="menu">
    <ul class="menu__list menu__list_footer">
      <li class="menu__item">
        <a class="menu__link menu__link_active" href="/seedra/src/pages/products/index.html">ALL PRODUCTS</a>
      </li>
      <li class="menu__item">
        <a class="menu__link" href="/seedra/src/pages/about/index.html">ABOUT SEEDRA</a>
      </li>
      <li class="menu__item">
        <a class="menu__link" href="/seedra/src/pages/blogs/index.html">OUR BLOG</a>
      </li>
      <li class="menu__item">
        <a class="menu__link" href="/seedra/src/pages/contacts/index.html">CONTACTS</a>
      </li>
    </ul>
  </nav>

        </div>

        <div class="footer__logo">
          <!-- logo ( ( path, classIcon ) ) -->
          <!-- prettier-ignore -->
          
        
  <a class="logo" href="#go-to-top">
    <svg class="logo-icon logo-icon_footer">
      <use xlink:href="/seedra/images/sprites.svg#logo-icon"></use>
    </svg>
  </a>

        </div>

        <nav class="policy">
          <ul class="policy__list">
            <li class="policy__item">
              <a class="policy__link" href="#!">Terms&Conditions</a>
            </li>
            <li class="policy__item">
              <a class="policy__link" href="#!">Privacy Policy</a>
            </li>
          </ul>
        </nav>
      </div>
      <hr class="footer__hr" />
      <div class="footer__bottom">
        <div class="footer__socials">
          <!-- socials ( classSocials ) -->
          <!-- prettier-ignore -->
          
        
  <div class="socials socials_footer">
    <a class="socials__link" href="#!">
      <svg class="socials__icon">
        <use xlink:href="/seedra/images/sprites.svg#instagram-icon"></use>
      </svg>
    </a>
    <a class="socials__link" href="#!">
      <svg class="socials__icon">
        <use xlink:href="/seedra/images/sprites.svg#facebook-icon"></use>
      </svg>
    </a>
  </div>

        </div>

        <div class="footer__rights">
          <!-- text ( text, classText ) -->
          <!-- prettier-ignore -->
          
        
  <p class="text text_regular-14">All rights reserved</p>

        </div>
      </div>
    </div>
  </footer>


	</body>
</html>
